<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Translator Pro</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0f172a;
  color:white;
}
.container {
  padding:15px;
}
textarea {
  width:100%;
  height:140px;
  border-radius:12px;
  padding:10px;
  font-size:14px;
}
select, button {
  width:100%;
  margin-top:8px;
  padding:12px;
  border-radius:10px;
  font-size:14px;
}
.card {
  background:#1e293b;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
}
.copy {
  margin-top:6px;
  background:#22c55e;
  border:none;
  padding:6px 12px;
  border-radius:6px;
  color:white;
}
.header {
  font-size:20px;
  margin-bottom:10px;
  font-weight:bold;
}
.loading {
  text-align:center;
  margin-top:15px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<div class="header">⚡ Translator Pro</div>

<textarea id="input" placeholder="Paste chats (one per line)..."></textarea>

<select id="source">
  <option value="auto">Auto Detect</option>
  <option value="Indonesian">Indonesian</option>
  <option value="Hindi">Hindi</option>
  <option value="English">English</option>
</select>

<select id="target">
  <option value="English">English</option>
  <option value="Hindi">Hindi</option>
</select>

<button onclick="run()">Translate</button>

<div id="out"></div>

</div>

<script>

const BACKEND = "https://translator-backend-lc5b.onrender.com"; // 🔥 your backend

async function run() {

  const input = document.getElementById("input").value;

  if (!input.trim()) {
    alert("Enter some text first");
    return;
  }

  const lines = input.split("\n").filter(l => l.trim());

  document.getElementById("out").innerHTML = 
    "<div class='loading'>⏳ Translating...</div>";

  try {

    const res = await fetch(`${BACKEND}/translate`, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        texts: lines,
        source: document.getElementById("source").value,
        target: document.getElementById("target").value
      })
    });

    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();

    let html = "";

    data.forEach((item,i)=>{
      html += `
      <div class="card">
        <b>${i+1}.</b><br>
        ${item.translation}
        <br>
        <button class="copy" onclick="copyText(\`${item.translation}\`)">Copy</button>
      </div>`;
    });

    document.getElementById("out").innerHTML = html;

  } catch (err) {
    document.getElementById("out").innerHTML = 
      "<div class='loading'>❌ Error connecting to server</div>";
  }
}

function copyText(text){
  navigator.clipboard.writeText(text);
}

</script>

</body>
</html>
