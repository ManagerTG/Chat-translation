<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Translator Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 15px;
    }

    h2 {
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 15px;
    }

    select {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
    }

    .card {
      background: #1e293b;
      padding: 12px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .small {
      opacity: 0.7;
      font-size: 13px;
    }

    .loading {
      margin-top: 10px;
      color: #38bdf8;
    }
  </style>
</head>

<body>

<h2>⚡ Translator Pro</h2>

<textarea id="input" placeholder="Paste Indonesian text here..."></textarea>

<select id="source">
  <option value="auto">Auto Detect</option>
  <option value="id">Indonesian</option>
</select>

<select id="target">
  <option value="en">English</option>
  <option value="hi">Hindi</option>
</select>

<div id="status" class="loading"></div>
<div id="output"></div>

<script>
const BACKEND = "https://translator-backend-lc5b.onrender.com/translate";

let timeout = null;

document.getElementById("input").addEventListener("input", () => {
  clearTimeout(timeout);
  timeout = setTimeout(runTranslate, 600); // debounce for speed
});

async function runTranslate() {
  const text = document.getElementById("input").value.trim();
  const status = document.getElementById("status");
  const output = document.getElementById("output");

  if (!text) {
    output.innerHTML = "";
    return;
  }

  status.innerText = "Translating...";
  output.innerHTML = "";

  try {
    const res = await fetch(BACKEND, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        texts: text.split("\n"),
        source: document.getElementById("source").value,
        target: document.getElementById("target").value
      })
    });

    const data = await res.json();

    status.innerText = "";

    let html = "";

    data.forEach(item => {
      html += `
        <div class="card">
          <div class="small">Original:</div>
          <div>${item.original}</div>

          <div class="small">Translation:</div>
          <div><b>${item.translation}</b></div>
        </div>
      `;
    });

    output.innerHTML = html;

  } catch (err) {
    status.innerText = "❌ Error connecting to server";
  }
}
</script>

</body>
</html>
