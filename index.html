<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AI Human Translator 🇮🇩 ↔ 🇬🇧</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
      padding: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      width: 100%;
      flex: 1;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 400;
      margin-bottom: 20px;
      color: #bb86fc;
      text-align: center;
    }
    .input-area {
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 16px;
      color: #fff;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border 0.2s;
    }
    textarea:focus {
      border-color: #bb86fc;
    }
    .results {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .chat-bubble {
      background: #1e1e1e;
      border-radius: 20px 20px 20px 4px;
      padding: 16px;
      border-left: 4px solid #bb86fc;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    .original {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .translation-main {
      font-size: 1.2rem;
      font-weight: 500;
      color: #fff;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .alternatives {
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px dashed #333;
    }
    .alt-item {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 8px 12px;
      margin: 6px 0;
      font-size: 0.95rem;
      color: #ccc;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tone-tag {
      display: inline-block;
      background: #2a2a2a;
      color: #bb86fc;
      border-radius: 16px;
      padding: 4px 12px;
      font-size: 0.75rem;
      text-transform: capitalize;
      margin-right: 8px;
    }
    .copy-btn {
      background: none;
      border: 1px solid #444;
      color: #bbb;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }
    .copy-btn:hover {
      background: #333;
      color: #fff;
    }
    .footer {
      text-align: center;
      margin-top: 20px;
      color: #666;
      font-size: 0.8rem;
    }
    .loading {
      text-align: center;
      color: #bb86fc;
      padding: 20px;
    }
    .error-msg {
      color: #cf6679;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌐 Human Translator</h1>
    <div class="input-area">
      <textarea id="inputText" rows="3" placeholder="Type or paste Indonesian/English... (auto-translates)"></textarea>
    </div>
    <div id="results" class="results">
      <!-- dynamic bubbles appear here -->
    </div>
    <div class="footer">⚡ Powered by Gemini AI • Free & human-like</div>
  </div>

  <script>
    const inputEl = document.getElementById('inputText');
    const resultsEl = document.getElementById('results');
    let debounceTimer;

    // Debounced translation
    inputEl.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        translate();
      }, 500); // 500ms debounce
    });

    async function translate() {
      const rawText = inputEl.value;
      // Split by newline, filter empty lines
      const lines = rawText.split('\n').filter(line => line.trim() !== '');
      
      if (lines.length === 0) {
        resultsEl.innerHTML = '';
        return;
      }

      // Show loading
      resultsEl.innerHTML = '<div class="loading">🤖 Translating...</div>';

      try {
        const response = await fetch('https://translator-backend-lc5b.onrender.com/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texts: lines })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderResults(data);
      } catch (err) {
        console.error(err);
        resultsEl.innerHTML = `<div class="error-msg">❌ Translation failed. Please try again.</div>`;
      }
    }

    function renderResults(translations) {
      if (!translations.length) {
        resultsEl.innerHTML = '';
        return;
      }

      let html = '';
      translations.forEach(item => {
        const main = item.translation_main || item.original;
        const alternatives = item.alternatives || [];
        const tone = item.tone || 'neutral';

        html += `
          <div class="chat-bubble">
            <div class="original">${escapeHtml(item.original)}</div>
            <div class="translation-main">
              <span class="tone-tag">${escapeHtml(tone)}</span>
              ${escapeHtml(main)}
              <button class="copy-btn" onclick="copyText('${escapeHtml(main).replace(/'/g, "\\'")}')">📋 Copy</button>
            </div>
        `;

        if (alternatives.length > 0) {
          html += `<div class="alternatives">`;
          alternatives.forEach(alt => {
            html += `
              <div class="alt-item">
                <span>${escapeHtml(alt)}</span>
                <button class="copy-btn" onclick="copyText('${escapeHtml(alt).replace(/'/g, "\\'")}')">Copy</button>
              </div>
            `;
          });
          html += `</div>`;
        }

        html += `</div>`;
      });

      resultsEl.innerHTML = html;
    }

    // Helper to escape HTML special characters
    function escapeHtml(unsafe) {
      if (!unsafe) return '';
      return unsafe
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // Copy to clipboard
    window.copyText = function(text) {
      navigator.clipboard.writeText(text).then(() => {
        // Optional: show a small toast
        alert('✅ Copied!');
      }).catch(err => {
        console.error('Copy failed', err);
      });
    };

    // Auto-resize textarea
    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });
  </script>
</body>
</html>
